name: Run tests
run-name: Run tests

on:
  push:
    branches: [main]
  pull_request:
    branches: main
  workflow_dispatch:

jobs:
  tests:
    permissions:
      contents: write
    runs-on: ubuntu-latest
   
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.12

      - name: Create uv virtualenv
        run: uv venv

      - name: Install dependencies
        run: |
          uv pip install --upgrade pip
          uv pip install -e .
          uv pip install --group dev

      - name: Run tests
        run: uv run pytest
        shell: bash
